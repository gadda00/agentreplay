site_name: AgentReplay
site_description: >-
  Deterministic replay and counterfactual debugging for AI agent reliability.
  Bit-exact replay of agent runs with zero model calls — record once,
  replay forever, mutate freely.
site_url: https://gadda00.github.io/agentreplay/
repo_url: https://github.com/gadda00/agentreplay
repo_name: gadda00/agentreplay
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Quick Start: quick-start.md
    - Examples: examples.md
  - Guides:
    - Recording: guides/recording.md
    - Replaying: guides/replaying.md
    - Counterfactual Mutation: guides/mutation.md
    - CI Regression: guides/ci.md
    - Framework Adapters: guides/frameworks.md
  - Reference:
    - API: api.md
    - CLI: cli.md
    - Cassette Format: cassette-format.md
  - Internals:
    - Architecture: architecture.md
    - Evaluation: evaluation.md
  - About:
    - Changelog: changelog.md
    - Contributing: contributing.md
    - License: license.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            show_bases: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - def_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gadda00/agentreplay
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentreplay/
