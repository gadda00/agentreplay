# Regression tests for the AgentReplay cassette corpus.
#
# This workflow replays every cassette under `cassettes/` in pure-replay
# mode against the agent entry point declared in `tests/regression.py`.
# Because pure replay makes zero model calls, this CI job costs no
# inference spend to run on every PR — see §5.7 of the product proposal.
#
# To add a new regression test:
#   1. Record a cassette with `agentreplay record cassettes/<name> -- python my_agent.py`
#   2. Commit the cassette directory to the repo (or upload to your
#      hosted cassette store if you outgrow Git).
#   3. This workflow picks it up automatically on the next PR.

name: agentreplay-regression

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Replay cassette corpus
        env:
          # Pure-replay mode never calls the model, so no API key needed.
          AGENTREPLAY_MODE: replay
        run: |
          agentreplay ci cassettes/ \
            --agent-entry my_project.tests:run_agent \
            --json > regression-report.json

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression-report.json
