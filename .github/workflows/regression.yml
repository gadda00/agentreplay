# Regression tests + overhead benchmark + reproduction-fidelity validation.
#
# This workflow runs three CI jobs on every PR and push to main:
#
#   1. Unit tests (pytest)
#   2. Cassette regression (pure replay, zero model calls — §5.7)
#   3. Overhead benchmark (verify ≤5% target — §7.2)
#   4. Reproduction-fidelity validation on synthetic tasks (§7.1)
#
# All three CI jobs run without any API key — pure replay and the
# synthetic task set are designed to exercise the full code path
# without external dependencies.

name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - run: pytest -q

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - name: Replay cassette corpus
        env:
          AGENTREPLAY_MODE: replay
        run: |
          agentreplay ci cassettes/ \
            --agent-entry agentreplay.regression:run_agent \
            --json > regression-report.json
          cat regression-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: regression-report.json

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - name: Overhead benchmark (§7.2 target: ≤5%)
        run: |
          agentreplay benchmark-overhead \
            --iterations 100 \
            --report benchmark-report.json \
            --json
          cat benchmark-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: benchmark-report.json

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .[dev]
      - name: Reproduction-fidelity validation (§7.1 target: 100%)
        run: |
          agentreplay validate-swebench \
            --tasks synthetic \
            --limit 3 \
            --report swebench-report.json
          cat swebench-report.json
      - name: GAIA validation
        run: |
          agentreplay validate-gaia \
            --tasks synthetic \
            --limit 3 \
            --report gaia-report.json
          cat gaia-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: "*-report.json"
